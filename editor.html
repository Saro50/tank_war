<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>坦克模型编辑器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #14161a; color: #e6e6e6; font-family: monospace; overflow: hidden; }

    #app {
      display: grid;
      grid-template-columns: 280px 1fr 340px;
      height: 100vh;
      width: 100vw;
    }

    /* 左侧参数树 */
    #tree-panel {
      background: #1a1c22;
      border-right: 1px solid #2a2c32;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #tree-header {
      padding: 12px 14px;
      font-size: 14px;
      font-weight: bold;
      color: #ffcc33;
      border-bottom: 1px solid #2a2c32;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #tree-header select {
      background: #22242a;
      color: #e6e6e6;
      border: 1px solid #3a3c42;
      border-radius: 4px;
      padding: 3px 8px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #tree-body {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    #tree-body::-webkit-scrollbar { width: 6px; }
    #tree-body::-webkit-scrollbar-track { background: transparent; }
    #tree-body::-webkit-scrollbar-thumb { background: #3a3c42; border-radius: 3px; }

    /* 树节点 */
    .tree-node {}
    .tree-group {
      cursor: pointer;
      user-select: none;
    }
    .tree-group-label {
      display: flex;
      align-items: center;
      padding: 5px 14px;
      font-size: 12px;
      color: #aaa;
      gap: 4px;
    }
    .tree-group-label:hover { background: #22242a; }
    .tree-group-label .arrow { transition: transform 0.15s; font-size: 10px; width: 12px; text-align: center; }
    .tree-group-label .arrow.open { transform: rotate(90deg); }
    .tree-leaf {
      padding: 4px 14px 4px 28px;
      font-size: 12px;
      color: #ccc;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-leaf:hover { background: #22242a; }
    .tree-leaf.active { background: #2a3a2a; color: #7fff7f; }

    /* 3D 视口 */
    #viewport {
      position: relative;
      background: #0e1014;
      overflow: hidden;
    }
    #viewport canvas { display: block; width: 100% !important; height: 100% !important; }
    #viewport-info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 11px;
      color: #666;
      pointer-events: none;
    }
    #viewport-controls {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 4px;
    }
    #viewport-controls button {
      background: rgba(30,34,42,0.8);
      color: #ccc;
      border: 1px solid #3a3c42;
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    #viewport-controls button:hover { background: #3a3c42; }

    /* 右侧属性面板 */
    #prop-panel {
      background: #1a1c22;
      border-left: 1px solid #2a2c32;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #prop-header {
      padding: 12px 14px;
      font-size: 14px;
      font-weight: bold;
      color: #7fff7f;
      border-bottom: 1px solid #2a2c32;
    }
    #prop-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }
    #prop-body::-webkit-scrollbar { width: 6px; }
    #prop-body::-webkit-scrollbar-track { background: transparent; }
    #prop-body::-webkit-scrollbar-thumb { background: #3a3c42; border-radius: 3px; }

    /* 属性表单项 */
    .prop-group { margin-bottom: 12px; }
    .prop-label { font-size: 11px; color: #888; margin-bottom: 3px; text-transform: uppercase; }
    .prop-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .prop-row label { font-size: 12px; color: #aaa; min-width: 60px; }
    .prop-row input[type="range"] { flex: 1; accent-color: #4a8aff; height: 4px; cursor: pointer; }
    .prop-row input[type="number"] {
      width: 70px;
      background: #22242a;
      color: #e6e6e6;
      border: 1px solid #3a3c42;
      border-radius: 3px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 12px;
      text-align: right;
    }
    .prop-row input[type="number"]:focus { outline: none; border-color: #4a8aff; }
    .prop-row .color-swatch {
      width: 28px; height: 28px;
      border-radius: 4px;
      border: 1px solid #3a3c42;
      cursor: pointer;
      flex-shrink: 0;
    }
    .prop-row .hex-label { font-size: 10px; color: #666; min-width: 58px; }

    /* 导出/导入按钮 */
    #export-bar {
      display: flex;
      gap: 8px;
      padding: 8px 14px;
      border-top: 1px solid #2a2c32;
    }
    #export-bar button {
      flex: 1;
      background: #2a3a2a;
      color: #7fff7f;
      border: 1px solid #3a5a3a;
      border-radius: 4px;
      padding: 6px 0;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #export-bar button:hover { background: #3a5a3a; }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #444;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 左侧参数树 -->
    <div id="tree-panel">
      <div id="tree-header">
        <span>📐 车型</span>
        <select id="variant-select">
          <option value="t14">T-14 Armata</option>
          <option value="tiger">虎式 Tiger I</option>
          <option value="abrams">M1 艾布拉姆斯</option>
        </select>
      </div>
      <div id="tree-body"></div>
    </div>

    <!-- 中间 3D 视口 -->
    <div id="viewport">
      <div id="viewport-controls">
        <button data-view="front">前</button>
        <button data-view="top">俯</button>
        <button data-view="side">侧</button>
        <button data-view="reset">复位</button>
        <button id="btn-wireframe">线框</button>
      </div>
      <div id="viewport-info">拖拽旋转 · 滚轮缩放 · 左键选部件</div>
    </div>

    <!-- 右侧属性面板 -->
    <div id="prop-panel">
      <div id="prop-header">参数属性</div>
      <div id="prop-body">
        <div class="empty-state">从左侧参数树选择一个分组</div>
      </div>
      <div id="export-bar">
        <button id="btn-export">📥 导出 JSON</button>
        <button id="btn-import">📤 导入 JSON</button>
      </div>
    </div>
  </div>
  <input type="file" id="file-input" accept=".json" style="display:none" />

  <script type="module" src="/src/editor/editor.ts"></script>
</body>
</html>
